services:
  redis:
    container_name: prs-redis
    ports:
      - ${PORT_REDIS}:${PORT_REDIS}
      - ${PORT_REDIS_INSIGHT}:${PORT_REDIS_INSIGHT}

  rabbitmq:
    container_name: prs-rabbitmq
    ports:
      - ${RABBIT_UI_PORT}:${RABBIT_UI_PORT}
      - ${RABBIT_PORT}:${RABBIT_PORT}
      - ${RABBIT_MQTT_PORT}:${RABBIT_MQTT_PORT}

  ldap:
    container_name: prs-openldap
    ports:
      - ${LDAP_PORT}:${LDAP_PORT}

  psql:
    container_name: prs-psql
    ports:
      - ${POSTGRES_PORT}:${POSTGRES_PORT}
