services:
  rabbitmq:
    container_name: prs-rabbitmq
    image: rabbitmq:4.1.1-management
    hostname: ${HOST_RABBIT}
    environment:
      RABBITMQ_SERVER_ADDITIONAL_ERL_ARGS: -rabbit log_levels [{connection,error},{default,error}] disk_free_limit 2147483648 -rabbitmq_management
      TZ: ${TIME_ZONE}
    volumes:
      - ../docker-files/rabbitmq/enabled_plugins:/etc/rabbitmq/enabled_plugins:ro
      - ../docker-files/rabbitmq/definitions.json:/etc/rabbitmq/definitions.json:ro
      - ../docker-files/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro
    networks:
      - peresvet

networks:
  peresvet:
    driver: bridge
    ipam:
      config:
          - subnet: 10.66.0.0/16
            gateway: 10.66.0.1