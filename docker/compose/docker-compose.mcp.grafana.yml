services:
  mcp_grafana:
    image: mcp/grafana:latest
    container_name: mcp_grafana
    depends_on:
      - grafana
    environment:
      TZ: ${TIME_ZONE}
      # URL Grafana внутри docker-сети; в проекте Grafana работает с sub-path /grafana
      GRAFANA_URL: http://${HOST_GRAFANA}:${PORT_GRAFANA}/grafana
      # Service account token (обязательно для большинства операций)
      GRAFANA_SERVICE_ACCOUNT_TOKEN: ${GRAFANA_SERVICE_ACCOUNT_TOKEN}
      GRAFANA_ORG_ID: ${MCP_GRAFANA_ORG_ID:-1}
    command:
      - "-transport"
      - "${MCP_GRAFANA_TRANSPORT:-streamable-http}"
      - "-address"
      - "0.0.0.0:${PORT_MCP_GRAFANA_INNER}"
    ports:
      - ${PORT_MCP_GRAFANA}:${PORT_MCP_GRAFANA_INNER}
    networks:
      - peresvet

networks:
  peresvet:
    driver: bridge
    ipam:
      config:
          - subnet: 10.66.0.0/16
            gateway: 10.66.0.1
